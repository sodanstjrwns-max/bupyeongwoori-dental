name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sanitize commit message (ASCII only for Cloudflare API)
        id: msg
        run: |
          RAW=$(git log -1 --pretty=%s)
          ASCII=$(echo "$RAW" | iconv -f UTF-8 -t ASCII//TRANSLIT//IGNORE 2>/dev/null | tr -cd '[:print:]\n' | head -c 200)
          if [ -z "$ASCII" ]; then ASCII="auto deploy ${GITHUB_SHA::7}"; fi
          echo "message=$ASCII" >> $GITHUB_OUTPUT
          echo "Commit message for CF: $ASCII"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=bupyeongwoori-dental --branch=main --commit-message="${{ steps.msg.outputs.message }}" --commit-hash=${{ github.sha }}
